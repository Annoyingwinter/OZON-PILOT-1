<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Admin" }} - OZON-PILOT</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-soft: #eff6ff;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --ok: #047857;
      --ok-soft: #d1fae5;
      --warn: #b45309;
      --warn-soft: #fef3c7;
      --nav: #0f172a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px 1fr;
    }
    .sidebar {
      background: var(--nav);
      color: #e5e7eb;
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .brand {
      padding: 0 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .brand strong { display: block; color: #ffffff; font-size: 17px; }
    .brand span { display: block; color: #94a3b8; font-size: 12px; margin-top: 4px; }
    .nav { display: grid; gap: 6px; }
    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #cbd5e1;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .nav a:hover { background: rgba(255,255,255,.08); color: #ffffff; }
    .logout { margin-top: auto; }
    .logout button {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      background: transparent;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
    }
    .content { min-width: 0; }
    .topbar {
      height: 64px;
      background: rgba(255,255,255,.88);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .topbar h1 { margin: 0; font-size: 18px; }
    .topbar .meta { color: var(--muted); font-size: 13px; }
    main { padding: 28px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
    }
    .card { padding: 18px; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .metric { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .panel { overflow: hidden; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h2 { margin: 0; font-size: 15px; }
    .muted { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    th {
      background: #f9fafb;
      color: #374151;
      font-weight: 650;
      white-space: nowrap;
    }
    tr:hover td { background: #fbfdff; }
    code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      background: #f3f4f6;
      padding: 2px 5px;
      border-radius: 5px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
      background: #f3f4f6;
      color: #374151;
      white-space: nowrap;
    }
    .pill.ok { background: var(--ok-soft); color: var(--ok); }
    .pill.danger { background: var(--danger-soft); color: var(--danger); }
    .pill.warn { background: var(--warn-soft); color: var(--warn); }
    .pill.info { background: var(--brand-soft); color: var(--brand); }
    .truncate {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>OZON-PILOT</strong>
        <span>Commerce Admin</span>
      </div>
      <nav class="nav">
        <a href="/admin/ui">Dashboard</a>
        <a href="/admin/ui/users">Users</a>
        <a href="/admin/ui/usage">Usage Logs</a>
        <a href="/admin/ui/subscriptions">Subscriptions</a>
        <a href="/admin/ui/licenses">Licenses</a>
      </nav>
      <form class="logout" method="post" action="/admin/ui/logout">
        <input name="csrf_token" type="hidden" value="{{ request.cookies.get('admin_csrf', '') }}">
        <button type="submit">Logout</button>
      </form>
    </aside>
    <section class="content">
      <div class="topbar">
        <h1>{{ title or "Admin" }}</h1>
        <div class="meta">{{ admin.email if admin else "" }}</div>
      </div>
      <main>
        {% block content %}{% endblock %}
      </main>
    </section>
  </div>
</body>
</html>
