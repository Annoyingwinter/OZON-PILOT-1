<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login - OZON-PILOT</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #111827;
      background:
        linear-gradient(120deg, rgba(37,99,235,.14), rgba(16,185,129,.08)),
        #f4f6fa;
    }
    .login {
      width: min(380px, calc(100vw - 32px));
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(15,23,42,.12);
    }
    h1 { margin: 0; font-size: 22px; }
    p { color: #6b7280; margin: 8px 0 20px; }
    label { display: block; color: #374151; font-size: 13px; font-weight: 650; margin-top: 14px; }
    input {
      width: 100%;
      margin-top: 7px;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 11px 12px;
      border: 0;
      border-radius: 8px;
      background: #111827;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin: 14px 0 0;
    }
  </style>
</head>
<body>
  <form class="login" method="post" action="/admin/ui/login">
    <h1>OZON-PILOT Admin</h1>
    <p>Manage accounts, usage, subscriptions, and licenses.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <input name="csrf_token" type="hidden" value="{{ csrf_token }}">
    <label>Email</label>
    <input name="email" type="email" autocomplete="username" required>
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
